<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Quini & Poceada</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --gold: #ffd700;
    --gold-dark: #ffb300;
    --purple: #8b5cf6;
    --green: #10b981;
    --red: #ef4444;
    --text: #ffffff;
    --text-dim: #a1a1aa;
    --card: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
    --card-dark: rgba(0,0,0,0.25);
    --accent: var(--gold);
    --accent-dark: var(--gold-dark);
  }

  [data-theme="light"] {
    --bg-1: #f3f4f6;
    --bg-2: #e5e7eb;
    --bg-3: #d1d5db;
    --gold: #f59e0b;
    --gold-dark: #d97706;
    --purple: #7c3aed;
    --green: #059669;
    --red: #dc2626;
    --text: #1f2937;
    --text-dim: #6b7280;
    --card: rgba(255, 255, 255, 0.8);
    --card-border: rgba(0, 0, 0, 0.1);
    --card-dark: rgba(0,0,0,0.05);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.5;
    transition: background 0.3s, color 0.3s;
  }

  .container { max-width: 1100px; margin: 0 auto; }

  header {
    text-align: center;
    padding: 20px 0 20px;
    position: relative;
  }

  .header-controls {
    position: absolute;
    top: 20px;
    right: 0;
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.3rem;
    transition: all 0.3s;
    color: var(--text);
  }
  .icon-btn:hover { transform: scale(1.1); }
  .icon-btn.muted { opacity: 0.5; }

  header h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  header p {
    color: var(--text-dim);
    margin-top: 6px;
    font-size: 0.95rem;
  }

  /* === TABS === */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 6px;
    backdrop-filter: blur(12px);
  }

  .tab {
    flex: 1;
    padding: 12px 16px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.2s;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #1a1a2e;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }

  [data-theme="light"] .tab:hover { background: rgba(0,0,0,0.05); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeIn 0.3s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 24px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    transition: background 0.3s, border-color 0.3s;
  }

  .card h2 {
    font-size: 1.25rem;
    margin-bottom: 18px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* === BOLILLAS === */
  .bolillero {
    display: grid;
    gap: 10px;
    margin: 20px 0;
  }
  .bolillero.cols-6 { grid-template-columns: repeat(6, 1fr); }
  .bolillero.cols-5 { grid-template-columns: repeat(5, 1fr); }

  .bolilla {
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: clamp(1.1rem, 3.5vw, 1.8rem);
    background: linear-gradient(145deg, #3a3a5c, #1a1a2e);
    border: 2px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    position: relative;
    transition: transform 0.3s;
    font-family: "Courier New", monospace;
  }

  [data-theme="light"] .bolilla {
    background: linear-gradient(145deg, #e5e7eb, #d1d5db);
    border-color: rgba(0,0,0,0.1);
  }

  .bolilla.activa {
    background: linear-gradient(145deg, var(--accent), var(--accent-dark));
    color: #1a1a2e;
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), inset 0 -4px 8px rgba(0,0,0,0.2);
    animation: pop 0.4s ease-out;
  }

  .bolilla.girando {
    animation: spin 0.12s linear infinite;
    background: linear-gradient(145deg, var(--purple), #6d28d9);
    color: white;
    border-color: rgba(255,255,255,0.3);
  }

  @keyframes spin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0.5; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* === BOTONES === */
  .btn {
    padding: 12px 22px;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: inherit;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #1a1a2e;
    box-shadow: 0 4px 14px rgba(255, 215, 0, 0.3);
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    border: 1px solid var(--card-border);
  }
  .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.18); }

  [data-theme="light"] .btn-secondary { background: rgba(0,0,0,0.05); }
  [data-theme="light"] .btn-secondary:hover:not(:disabled) { background: rgba(0,0,0,0.1); }

  .btn-success { background: var(--green); color: white; }
  .btn-success:hover:not(:disabled) { background: #059669; }

  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover:not(:disabled) { background: #dc2626; }

  .btn-whatsapp { background: #25D366; color: white; }
  .btn-whatsapp:hover:not(:disabled) { background: #20ba5a; }

  .btn-small { padding: 6px 12px; font-size: 0.8rem; border-radius: 8px; }

  .acciones-sorteo {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 16px;
  }

  .btn-sortear {
    font-size: 1.1rem;
    padding: 16px 40px;
    letter-spacing: 1px;
  }

  /* === SORTEOS GUARDADOS === */
  .sorteo-item {
    background: var(--card-dark);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    transition: all 0.2s;
  }

  .sorteo-item:hover { border-color: rgba(255,215,0,0.3); }

  .sorteo-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
  }

  .sorteo-fecha {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-family: "Courier New", monospace;
  }

  .sorteo-numeros {
    display: grid;
    gap: 6px;
    margin: 10px 0;
  }
  .sorteo-numeros.cols-6 { grid-template-columns: repeat(6, 1fr); }
  .sorteo-numeros.cols-5 { grid-template-columns: repeat(5, 1fr); }

  .sorteo-numero {
    aspect-ratio: 1;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--accent), var(--accent-dark));
    color: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    font-family: "Courier New", monospace;
    position: relative;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.2);
  }

  .sorteo-numero .btn-refresh {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--purple);
    color: white;
    border: 2px solid var(--bg-2);
    font-size: 0.7rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }

  .sorteo-numero .btn-refresh:hover { transform: scale(1.15) rotate(180deg); }

  .sorteo-item.editando .sorteo-numero {
    background: linear-gradient(145deg, #4c1d95, #6d28d9);
    color: white;
  }
  .sorteo-item.editando .btn-refresh { display: flex; }

  .sorteo-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .empty-state .emoji { font-size: 3rem; margin-bottom: 10px; }

  /* === ESTADÍSTICAS === */
  .stats-toggle {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 1.25rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 0;
    margin-bottom: 18px;
    font-family: inherit;
  }
  .stats-toggle:hover { opacity: 0.8; }

  .stats-content { display: none; }
  .stats-content.active { display: block; animation: fadeIn 0.3s; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .stats-section h3 {
    font-size: 1rem;
    margin-bottom: 12px;
    color: var(--text);
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .stat-number {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--accent), var(--accent-dark));
    color: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.9rem;
    font-family: "Courier New", monospace;
    flex-shrink: 0;
  }

  .stat-bar-container {
    flex: 1;
    height: 24px;
    background: var(--card-dark);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .stat-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #34d399);
    border-radius: 12px;
    transition: width 0.5s ease-out;
    display: flex;
    align-items: center;
    padding-left: 8px;
    color: white;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .stat-bar.low { background: linear-gradient(90deg, var(--red), #f87171); }

  .stats-summary {
    text-align: center;
    padding: 16px;
    background: var(--card-dark);
    border-radius: 12px;
    margin-bottom: 20px;
  }

  .stats-summary .big-number {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .stats-summary p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .stats-empty {
    text-align: center;
    padding: 30px;
    color: var(--text-dim);
  }

  /* === MODAL === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: linear-gradient(135deg, #1a1a2e, #24243e);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 28px;
    max-width: 420px;
    width: 100%;
    animation: modalIn 0.25s ease-out;
  }

  [data-theme="light"] .modal {
    background: linear-gradient(135deg, #ffffff, #f3f4f6);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal h3 { color: var(--accent); margin-bottom: 12px; font-size: 1.2rem; }
  .modal p { color: var(--text-dim); margin-bottom: 20px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1a1a2e;
    border: 1px solid var(--card-border);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 0.9rem;
    z-index: 2000;
    opacity: 0;
    transition: all 0.3s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    body { padding: 12px; }
    .card { padding: 16px; }
    .bolillero { gap: 6px; }
    .sorteo-numeros { gap: 4px; }
    .btn-sortear { padding: 14px 24px; font-size: 1rem; }
    .acciones-sorteo .btn { flex: 1; min-width: 120px; justify-content: center; }
    .stats-grid { grid-template-columns: 1fr; }
    .icon-btn { width: 38px; height: 38px; font-size: 1.1rem; }
    .tab { padding: 10px 8px; font-size: 0.85rem; }
    .header-controls { top: 12px; right: 0; }
  }

  .hidden { display: none !important; }
  .file-input { display: none; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-controls">
      <button class="icon-btn" id="soundToggle" title="Sonido">🔊</button>
      <button class="icon-btn" id="themeToggle" title="Tema">🌙</button>
    </div>
    <h1 id="mainTitle">🎰 Mi Quini & Poceada</h1>
    <p id="mainSubtitle">Tus sorteos favoritos en un solo lugar</p>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="quini">🎰 Mi Quini (0-45 · 6 núm.)</button>
    <button class="tab" data-tab="poceada">🎱 Mi Poceada (00-99 · 5 núm.)</button>
  </div>

  <!-- PANEL QUINI -->
  <div class="tab-panel active" id="panel-quini">
    <section class="card">
      <h2>✨ Sorteo actual</h2>
      <div class="bolillero cols-6" id="bolillero-quini">
        <div class="bolilla">–</div><div class="bolilla">–</div><div class="bolilla">–</div>
        <div class="bolilla">–</div><div class="bolilla">–</div><div class="bolilla">–</div>
      </div>
      <div class="acciones-sorteo">
        <button class="btn btn-primary btn-sortear" data-accion="sortear" data-tab="quini">🎲 SORTEAR</button>
        <button class="btn btn-secondary hidden" data-accion="regenerar" data-tab="quini">🔄 Regenerar todos</button>
        <button class="btn btn-success hidden" data-accion="guardar" data-tab="quini">💾 Guardar sorteo</button>
      </div>
    </section>

    <section class="card">
      <button class="stats-toggle" data-accion="stats-toggle" data-tab="quini">
        📊 Estadísticas <span data-stats-arrow="quini">▼</span>
      </button>
      <div class="stats-content" data-stats-content="quini">
        <div data-stats-container="quini"></div>
      </div>
    </section>

    <section class="card">
      <h2>📜 Sorteos guardados</h2>
      <div class="toolbar">
        <button class="btn btn-danger btn-small hidden" data-accion="eliminar-todos" data-tab="quini">🗑️ Eliminar todos</button>
      </div>
      <div data-historial="quini"></div>
    </section>

    <section class="card">
      <h2>💼 Backup de Mi Quini</h2>
      <div class="acciones-sorteo" style="justify-content:flex-start;">
        <button class="btn btn-secondary" data-accion="exportar" data-tab="quini">📤 Exportar JSON</button>
        <button class="btn btn-secondary" data-accion="importar" data-tab="quini">📥 Importar JSON</button>
        <input type="file" data-file="quini" class="file-input" accept=".json,application/json">
      </div>
    </section>
  </div>

  <!-- PANEL POCEADA -->
  <div class="tab-panel" id="panel-poceada">
    <section class="card">
      <h2>✨ Sorteo actual</h2>
      <div class="bolillero cols-5" id="bolillero-poceada">
        <div class="bolilla">–</div><div class="bolilla">–</div><div class="bolilla">–</div>
        <div class="bolilla">–</div><div class="bolilla">–</div>
      </div>
      <div class="acciones-sorteo">
        <button class="btn btn-primary btn-sortear" data-accion="sortear" data-tab="poceada">🎲 SORTEAR</button>
        <button class="btn btn-secondary hidden" data-accion="regenerar" data-tab="poceada">🔄 Regenerar todos</button>
        <button class="btn btn-success hidden" data-accion="guardar" data-tab="poceada">💾 Guardar sorteo</button>
      </div>
    </section>

    <section class="card">
      <button class="stats-toggle" data-accion="stats-toggle" data-tab="poceada">
        📊 Estadísticas <span data-stats-arrow="poceada">▼</span>
      </button>
      <div class="stats-content" data-stats-content="poceada">
        <div data-stats-container="poceada"></div>
      </div>
    </section>

    <section class="card">
      <h2>📜 Sorteos guardados</h2>
      <div class="toolbar">
        <button class="btn btn-danger btn-small hidden" data-accion="eliminar-todos" data-tab="poceada">🗑️ Eliminar todos</button>
      </div>
      <div data-historial="poceada"></div>
    </section>

    <section class="card">
      <h2>💼 Backup de Mi Poceada</h2>
      <div class="acciones-sorteo" style="justify-content:flex-start;">
        <button class="btn btn-secondary" data-accion="exportar" data-tab="poceada">📤 Exportar JSON</button>
        <button class="btn btn-secondary" data-accion="importar" data-tab="poceada">📥 Importar JSON</button>
        <input type="file" data-file="poceada" class="file-input" accept=".json,application/json">
      </div>
    </section>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Confirmar</h3>
    <p id="modalMessage">¿Estás seguro?</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalCancel">Cancelar</button>
      <button class="btn btn-danger" id="modalConfirm">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================
   MI QUINI & POCEADA - Sistema unificado
   ============================================ */

/* ---------- Configuración de modalidades ---------- */
const MODALIDADES = {
  quini: {
    nombre: "Mi Quini",
    emoji: "🎰",
    dbName: "MiQuiniDB",
    storeName: "sorteos",
    min: 0,
    max: 45,
    cantidad: 6,
    digitos: 2,
    colsClass: "cols-6",
    colorAccent: { dark: "#ffd700", light: "#f59e0b" },
    colorAccentDark: { dark: "#ffb300", light: "#d97706" }
  },
  poceada: {
    nombre: "Mi Poceada",
    emoji: "🎱",
    dbName: "MiPoceadaDB",
    storeName: "sorteos",
    min: 0,
    max: 99,
    cantidad: 5,
    digitos: 2,
    colsClass: "cols-5",
    colorAccent: { dark: "#ffd700", light: "#f59e0b" },
    colorAccentDark: { dark: "#ffb300", light: "#d97706" }
  }
};

/* ---------- Estado global ---------- */
const estado = {
  quini: { db: null, sorteoActual: null, sorteosCache: [] },
  poceada: { db: null, sorteoActual: null, sorteosCache: [] }
};

let soundEnabled = localStorage.getItem("miQuiniPoceada_sound") !== "false";
let audioContext = null;
let tabActiva = "quini";

/* ---------- Audio ---------- */
function initAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playTone(freq, duration, type = "sine", volume = 0.3) {
  if (!soundEnabled || !audioContext) return;
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  oscillator.frequency.value = freq;
  oscillator.type = type;
  gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
  oscillator.start(audioContext.currentTime);
  oscillator.stop(audioContext.currentTime + duration);
}

function playTick() { playTone(800, 0.05, "square", 0.1); }
function playPop() {
  playTone(600, 0.15, "sine", 0.3);
  setTimeout(() => playTone(900, 0.1, "sine", 0.2), 50);
}
function playFanfarria() {
  [523, 659, 784, 1047].forEach((nota, i) => {
    setTimeout(() => playTone(nota, 0.2, "sine", 0.25), i * 100);
  });
}

/* ---------- IndexedDB ---------- */
function abrirDB(modId) {
  const mod = MODALIDADES[modId];
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(mod.dbName, 1);
    req.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains(mod.storeName)) {
        database.createObjectStore(mod.storeName, { keyPath: "id" });
      }
    };
    req.onsuccess = (e) => { estado[modId].db = e.target.result; resolve(); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll(modId) {
  return new Promise((resolve, reject) => {
    const mod = MODALIDADES[modId];
    const tx = estado[modId].db.transaction(mod.storeName, "readonly");
    const req = tx.objectStore(mod.storeName).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbAdd(modId, sorteo) {
  return new Promise((resolve, reject) => {
    const mod = MODALIDADES[modId];
    const tx = estado[modId].db.transaction(mod.storeName, "readwrite");
    const req = tx.objectStore(mod.storeName).put(sorteo);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(modId, id) {
  return new Promise((resolve, reject) => {
    const mod = MODALIDADES[modId];
    const tx = estado[modId].db.transaction(mod.storeName, "readwrite");
    const req = tx.objectStore(mod.storeName).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbClear(modId) {
  return new Promise((resolve, reject) => {
    const mod = MODALIDADES[modId];
    const tx = estado[modId].db.transaction(mod.storeName, "readwrite");
    const req = tx.objectStore(mod.storeName).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

/* ---------- Lógica de sorteo ---------- */
function generarUnico(modId, excluir = []) {
  const mod = MODALIDADES[modId];
  const set = new Set(excluir);
  const disponibles = [];
  for (let i = mod.min; i <= mod.max; i++) {
    if (!set.has(i)) disponibles.push(i);
  }
  if (disponibles.length === 0) return null;
  return disponibles[Math.floor(Math.random() * disponibles.length)];
}

function generarNumeros(modId) {
  const mod = MODALIDADES[modId];
  const nums = [];
  while (nums.length < mod.cantidad) {
    const n = Math.floor(Math.random() * (mod.max - mod.min + 1)) + mod.min;
    if (!nums.includes(n)) nums.push(n);
  }
  return nums.sort((a, b) => a - b);
}

function reemplazarNumero(modId, numeros, indice) {
  const otros = numeros.filter((_, i) => i !== indice);
  const nuevo = generarUnico(modId, otros);
  if (nuevo === null) return numeros;
  const copia = [...numeros];
  copia[indice] = nuevo;
  return copia.sort((a, b) => a - b);
}

/* ---------- Utilidades ---------- */
function pad(n, digitos = 2) { return n.toString().padStart(digitos, "0"); }

function formatearFecha(ts) {
  const d = new Date(ts);
  const p = (n) => n.toString().padStart(2, "0");
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function generarId() {
  const d = new Date();
  const p = (n) => n.toString().padStart(2, "0");
  const stamp = `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
  return `sorteo_${stamp}_${Date.now()}`;
}

function esperar(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ---------- UI: Sorteo actual ---------- */
async function animarSorteo(modId) {
  initAudio();
  const mod = MODALIDADES[modId];
  const numeros = generarNumeros(modId);
  const bolillero = document.getElementById(`bolillero-${modId}`);
  const bolillas = bolillero.querySelectorAll(".bolilla");

  bolillas.forEach(b => {
    b.classList.remove("activa");
    b.classList.add("girando");
  });

  const intervalos = [];
  bolillas.forEach((b) => {
    const intv = setInterval(() => {
      const random = Math.floor(Math.random() * (mod.max - mod.min + 1)) + mod.min;
      b.textContent = pad(random, mod.digitos);
      playTick();
    }, 70);
    intervalos.push(intv);
  });

  for (let i = 0; i < mod.cantidad; i++) {
    await esperar(400 + i * 100);
    clearInterval(intervalos[i]);
    bolillas[i].textContent = pad(numeros[i], mod.digitos);
    bolillas[i].classList.remove("girando");
    bolillas[i].classList.add("activa");
    playPop();
  }

  playFanfarria();
  estado[modId].sorteoActual = { numeros };

  const panel = document.getElementById(`panel-${modId}`);
  panel.querySelector('[data-accion="regenerar"]').classList.remove("hidden");
  panel.querySelector('[data-accion="guardar"]').classList.remove("hidden");
  panel.querySelector('[data-accion="sortear"]').textContent = "🎲 SORTEAR DE NUEVO";
}

  };

async function reSortearNumero(modId, id, indice) {
  initAudio();
  const mod = MODALIDADES[modId];
  const sorteo = estado[modId].sorteosCache.find(s => s.id === id);
  if (!sorteo) return;
  const nuevos = reemplazarNumero(modId, sorteo.numeros, indice);
  sorteo.numeros = nuevos;

  const item = document.querySelector(`[data-historial="${modId}"] .sorteo-item[data-id="${id}"]`);
  const numsDivs = item.querySelectorAll(".sorteo-numero");
  const bolilla = numsDivs[indice];
  
  // Guardar el nodo de texto (para no perderlo al animar)
  const textNode = bolilla.firstChild;
  bolilla.classList.remove("activa");
  bolilla.classList.add("girando");

  const intv = setInterval(() => {
    const r = Math.floor(Math.random() * (mod.max - mod.min + 1)) + mod.min;
    textNode.textContent = pad(r, mod.digitos);
    playTick();
  }, 70);

  await esperar(500);
  clearInterval(intv);
  bolilla.classList.remove("girando");
  bolilla.classList.add("activa");
  playPop();

  numsDivs.forEach((div, i) => {
    div.firstChild.textContent = pad(nuevos[i], mod.digitos);
  });
}

  const texto = `${mod.nombre} - Sorteo del ${formatearFecha(sorteo.fecha)}\nNúmeros: ${sorteo.numeros.map(n => pad(n, mod.digitos)).join(" - ")}`;
  try {
    await navigator.clipboard.writeText(texto);
    toast("Sorteo copiado 📋", "success");
  } catch {
    const ta = document.createElement("textarea");
    ta.value = texto;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    toast("Sorteo copiado 📋", "success");
  }

/* ---------- Estadísticas ---------- */
function renderEstadisticas(modId) {
  const mod = MODALIDADES[modId];
  const cache = estado[modId].sorteosCache;
  const container = document.querySelector(`[data-stats-container="${modId}"]`);

  if (cache.length === 0) {
    container.innerHTML = `<div class="stats-empty"><p>📊 Guardá sorteos para ver las estadísticas</p></div>`;
    return;
  }

  const frecuencia = {};
  for (let i = mod.min; i <= mod.max; i++) frecuencia[i] = 0;
  cache.forEach(s => s.numeros.forEach(n => frecuencia[n]++));

  const stats = Object.entries(frecuencia)
    .map(([num, count]) => ({ numero: parseInt(num), cantidad: count }))
    .sort((a, b) => b.cantidad - a.cantidad);

  const maxFreq = stats[0]?.cantidad || 1;
  const top6 = stats.slice(0, 6);
  const bottom6 = stats.slice(-6).reverse();

  container.innerHTML = `
    <div class="stats-summary">
      <div class="big-number">${cache.length}</div>
      <p>sorteo${cache.length !== 1 ? 's' : ''} guardado${cache.length !== 1 ? 's' : ''}</p>
    </div>
    <div class="stats-grid">
      <div class="stats-section">
        <h3>🔥 Más frecuentes</h3>
        ${top6.map(s => `
          <div class="stat-item">
            <div class="stat-number">${pad(s.numero, mod.digitos)}</div>
            <div class="stat-bar-container">
              <div class="stat-bar" style="width: ${(s.cantidad / maxFreq) * 100}%">${s.cantidad}x</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="stats-section">
        <h3>❄️ Menos frecuentes</h3>
        ${bottom6.map(s => `
          <div class="stat-item">
            <div class="stat-number">${pad(s.numero, mod.digitos)}</div>
            <div class="stat-bar-container">
              <div class="stat-bar low" style="width: ${(s.cantidad / maxFreq) * 100}%">${s.cantidad}x</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ---------- Exportar / Importar ---------- */
async function exportarJSON(modId) {
  const mod = MODALIDADES[modId];
  try {
    const data = await dbGetAll(modId);
    const payload = {
      app: mod.nombre,
      modalidad: modId,
      version: 1,
      exportedAt: new Date().toISOString(),
      sorteos: data
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date();
    const p = (n) => n.toString().padStart(2, "0");
    const nombre = `${mod.nombre.toLowerCase().replace(/\s+/g, "_")}_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}.json`;
    a.href = url;
    a.download = nombre;
    a.click();
    URL.revokeObjectURL(url);
    toast(`Exportado: ${nombre} 📤`, "success");
  } catch (err) {
    toast("Error al exportar: " + err.message, "error");
  }
}

async function importarJSON(modId, file) {
  const mod = MODALIDADES[modId];
  const ok = await modalConfirm(
    `Importar sorteos de ${mod.nombre}`,
    `⚠️ Esta acción REEMPLAZARÁ completamente todos los sorteos actuales de ${mod.nombre}. ¿Continuar?`
  );
  if (!ok) return;

  try {
    const texto = await file.text();
    const data = JSON.parse(texto);

    if (!data || !Array.isArray(data.sorteos)) {
      throw new Error("El archivo no tiene el formato esperado (falta 'sorteos').");
    }

    for (const s of data.sorteos) {
      if (!s.id || !Array.isArray(s.numeros) || !s.fecha) {
        throw new Error("Al menos un sorteo tiene formato inválido.");
      }
      if (s.numeros.length !== mod.cantidad) {
        throw new Error(`El sorteo ${s.id} no tiene ${mod.cantidad} números (esperado para ${mod.nombre}).`);
      }
      for (const n of s.numeros) {
        if (typeof n !== "number" || n < mod.min || n > mod.max) {
          throw new Error(`Número inválido (${n}) en sorteo ${s.id}. Rango válido: ${mod.min}-${mod.max}.`);
        }
      }
    }

    await dbClear(modId);
    for (const s of data.sorteos) {
      await dbAdd(modId, s);
    }
    toast(`Importados ${data.sorteos.length} sorteos ✅`, "success");
    await cargarHistorial(modId);
  } catch (err) {
    toast("Error al importar: " + err.message, "error");
  }
}

const modalCancelBtn = document.getElementById("modalCancel");

function modalConfirm(titulo, mensaje) {
  return new Promise((resolve) => {
    modalTitle.textContent = titulo;
    modalMessage.textContent = mensaje;
    modalOverlay.classList.add("active");

    const limpiar = () => {
      modalOverlay.classList.remove("active");
      modalConfirmBtn.onclick = null;
      modalCancelBtn.onclick = null;
      modalOverlay.onclick = null;
    };

    modalConfirmBtn.onclick = () => { limpiar(); resolve(true); };
    modalCancelBtn.onclick = () => { limpiar(); resolve(false); };
    modalOverlay.onclick = (e) => {
      if (e.target === modalOverlay) { limpiar(); resolve(false); }
    };
  });
}

/* ---------- Toast ---------- */
const toastEl = document.getElementById("toast");
let toastTimer = null;
function toast(msg, tipo = "") {
  toastEl.textContent = msg;
  toastEl.className = "toast show " + tipo;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2800);
}

/* ---------- Delegación de eventos ---------- */
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-accion]");
  if (!btn) return;
  const accion = btn.dataset.accion;
  const modId = btn.dataset.tab;

  switch (accion) {
    case "sortear": animarSorteo(modId); break;
    case "regenerar":
      if (estado[modId].sorteoActual) animarSorteo(modId);
      break;
    case "guardar": guardarSorteoActual(modId); break;
    case "eliminar-todos": confirmarEliminarTodos(modId); break;
    case "exportar": exportarJSON(modId); break;
    case "importar":
      document.querySelector(`[data-file="${modId}"]`).click();
      break;
    case "stats-toggle":
      const content = document.querySelector(`[data-stats-content="${modId}"]`);
      const arrow = document.querySelector(`[data-stats-arrow="${modId}"]`);
      content.classList.toggle("active");
      arrow.textContent = content.classList.contains("active") ? "▲" : "▼";
      break;
  }
});

document.querySelectorAll("[data-file]").forEach(input => {
  input.addEventListener("change", (e) => {
    const modId = e.target.dataset.file;
    const file = e.target.files[0];
    if (file) importarJSON(modId, file);
    e.target.value = "";
  });
});

/* ---------- Inicio ---------- */
(async () => {
  try {
    await abrirDB("quini");
    await abrirDB("poceada");
    resetearBolillero("quini");
    resetearBolillero("poceada");
    await cargarHistorial("quini");
    await cargarHistorial("poceada");
  } catch (err) {
    toast("Error al iniciar: " + err.message, "error");
    console.error(err);
  }
})();
</script>
